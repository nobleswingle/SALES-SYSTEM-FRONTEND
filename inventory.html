<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - Sales System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>Sales System</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="sales.html" class="nav-item active">🧾 Sales</a>
        <a href="inventory.html" class="nav-item">📦 Inventory</a>
        <a href="reports.html" class="nav-item">📈 Reports</a>
        <a href="employees.html" class="nav-item">👥 Employees</a>
      </nav>

      <div class="sidebar-bottom">
        <a href="login.html" class="nav-item logout">
          🚪 Log Out
        </a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP BAR -->
      <div class="topbar">
        <div>
          <h1 class="page-title">Inventory</h1>
          <p class="topbar-date" id="currentDate"></p>
        </div>
        <div class="topbar-user">
          <span>Welcome, </span>
          <strong>Admin</strong>
        </div>
      </div>

      <!-- ADD PRODUCT BUTTON -->
      <div class="inventory-actions">
        <button class="btn-record" id="showFormBtn">
          + Add New Product
        </button>
      </div>

      <!-- ADD / EDIT PRODUCT FORM (hidden by default) -->
      <div class="section-box" id="productFormBox" style="display:none;">
        <div class="section-header">
          <h3 id="formTitle">Add New Product</h3>
          <button class="btn-secondary" id="cancelFormBtn">Cancel</button>
        </div>

        <form id="productForm">

          <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" placeholder="e.g. Indomie Noodles">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="costPrice">Cost Price (₦)</label>
              <input type="number" id="costPrice" min="0" placeholder="0">
            </div>

            <div class="form-group">
              <label for="sellingPrice">Selling Price (₦)</label>
              <input type="number" id="sellingPrice" min="0" placeholder="0">
            </div>

            <div class="form-group">
              <label for="stockQuantity">Stock Quantity</label>
              <input type="number" id="stockQuantity" min="0" placeholder="0">
            </div>
          </div>

          <p id="productFormError" class="error-message"></p>

          <button type="submit" class="btn-record" id="productFormBtn">
            ✅ Save Product
          </button>

        </form>
      </div>

      <!-- PRODUCTS TABLE -->
      <div class="section-box">
        <div class="section-header">
          <h3>All Products</h3>
          <span class="badge" id="productCount">0 products</span>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Product Name</th>
              <th>Cost Price</th>
              <th>Selling Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTableBody">
            <!-- filled by app.js -->
          </tbody>
        </table>

        <p id="noProductsMsg" class="empty-message">
          No products added yet.
        </p>

      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
