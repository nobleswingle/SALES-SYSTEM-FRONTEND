<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales - Sales System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-layout">

    <!-- SIDEBAR (same on every page) -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>Sales System</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="sales.html" class="nav-item active">🧾 Sales</a>
        <a href="inventory.html" class="nav-item">📦 Inventory</a>
        <a href="reports.html" class="nav-item">📈 Reports</a>
        <a href="employees.html" class="nav-item">👥 Employees</a>
      </nav>

      <div class="sidebar-bottom">
        <a href="login.html" class="nav-item logout">
          🚪 Log Out
        </a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP BAR -->
      <div class="topbar">
        <div>
          <h1 class="page-title">Record a Sale</h1>
          <p class="topbar-date" id="currentDate"></p>
        </div>
        <div class="topbar-user">
          <span>Welcome, </span>
          <strong>Admin</strong>
        </div>
      </div>

      <!-- NEW SALE FORM -->
      <div class="section-box" id="saleFormSection">
        <div class="section-header">
          <h3>New Sale</h3>
        </div>

        <form id="saleForm">

          <div class="form-group">
            <label for="productSelect">Product</label>
            <select id="productSelect">
              <option value="">-- Select a product --</option>
            </select>
          </div>

          <div class="form-row">

            <div class="form-group">
              <label for="quantityInput">Quantity</label>
              <input
                type="number"
                id="quantityInput"
                min="1"
                value="1"
              >
            </div>

            <div class="form-group">
              <label>Unit Price</label>
              <input
                type="text"
                id="unitPrice"
                disabled
                placeholder="Select a product"
              >
            </div>

            <div class="form-group">
              <label>Total Amount</label>
              <input
                type="text"
                id="totalAmount"
                disabled
                placeholder="₦0.00"
              >
            </div>

          </div>

          <p id="saleError" class="error-message"></p>
          <p id="saleSuccess" class="success-message"></p>

          <button type="submit" class="btn-record">
            ✅ Record Sale
          </button>

        </form>
      </div>

      <!-- TODAY'S SALES LIST -->
      <div class="section-box">
        <div class="section-header">
          <h3>Today's Sales</h3>
          <span class="badge" id="salesTodayCount">0 sales</span>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Total</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="salesTodayBody">
            <!-- filled by app.js -->
          </tbody>
        </table>

        <p id="noSalesMsg" class="empty-message">
          No sales recorded yet today.
        </p>

      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
