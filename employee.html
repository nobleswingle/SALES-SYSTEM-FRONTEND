<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees - Sales System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>Sales System</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="sales.html" class="nav-item active">🧾 Sales</a>
        <a href="inventory.html" class="nav-item">📦 Inventory</a>
        <a href="reports.html" class="nav-item">📈 Reports</a>
        <a href="employees.html" class="nav-item">👥 Employees</a>
      </nav>

      <div class="sidebar-bottom">
        <a href="login.html" class="nav-item logout">
          🚪 Log Out
        </a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP BAR -->
      <div class="topbar">
        <div>
          <h1 class="page-title">Employees</h1>
          <p class="topbar-date" id="currentDate"></p>
        </div>
        <div class="topbar-user">
          <span>Welcome, </span>
          <strong>Admin</strong>
        </div>
      </div>

      <!-- ADD EMPLOYEE BUTTON -->
      <div class="inventory-actions">
        <button class="btn-record" id="showEmployeeFormBtn">
          + Add New Employee
        </button>
      </div>

      <!-- ADD / EDIT EMPLOYEE FORM -->
      <div class="section-box" id="employeeFormBox" style="display:none;">
        <div class="section-header">
          <h3 id="employeeFormTitle">Add New Employee</h3>
          <button class="btn-secondary" id="cancelEmployeeFormBtn">
            Cancel
          </button>
        </div>

        <form id="employeeForm">

          <div class="form-row">
            <div class="form-group">
              <label for="employeeName">Full Name</label>
              <input
                type="text"
                id="employeeName"
                placeholder="e.g. Chidi Okeke"
              >
            </div>

            <div class="form-group">
              <label for="employeeRole">Role</label>
              <select id="employeeRole">
                <option value="employee">Employee</option>
                <option value="manager">Manager</option>
              </select>
            </div>

            <div class="form-group">
              <label for="employeePin">Login PIN (4 digits)</label>
              <input
                type="password"
                id="employeePin"
                maxlength="4"
                placeholder="e.g. 1234"
              >
            </div>
          </div>

          <p id="employeeFormError" class="error-message"></p>

          <button type="submit" class="btn-record" id="employeeFormBtn">
            ✅ Save Employee
          </button>

        </form>
      </div>

      <!-- EMPLOYEES TABLE -->
      <div class="section-box">
        <div class="section-header">
          <h3>All Employees</h3>
          <span class="badge" id="employeeCount">0 employees</span>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Role</th>
              <th>Sales Today</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            <!-- filled by app.js -->
          </tbody>
        </table>

        <p id="noEmployeesMsg" class="empty-message">
          No employees added yet.
        </p>

      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
